body::before{

.top-logo{

.title-box{
    background:rgba(10,15,25,.72);
    padding:15px 25px;
    border-radius:22px;
    border:1px solid rgba(0,234,255,.25);
    backdrop-filter:blur(8px);

}

.title-box h1{

}

.title-box p{
    color:#d9f8ff;
    font-size:14px;
}

.platform-select-btn{
    padding:10px 20px;
    margin:8px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    color:#fff;
    font-size:0.9em;
    font-weight:bold;
    background:linear-gradient(135deg,#00d4ff,#0066ff);
    position:relative;
    overflow:hidden;
    transition:.3s;
    box-shadow:0 0 25px rgba(0,212,255,.35);
}

.platform-select-btn:hover{
    transform:translateY(-3px) scale(1.05);
}

.platform-select-btn::before{
    content:'';
    position:absolute;
    top:0;
    left:-120%;
    width:100%;
    height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
    transition:.7s;
}

.platform-select-btn:hover::before{left:120%;}

#overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    backdrop-filter:blur(5px);
    z-index:999;
}

.modal{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:350px;
    max-width:90%;
    background:rgba(12,18,30,.96);
    border:1px solid rgba(0,255,255,.2);
    border-radius:20px;
    padding:25px;
    opacity:0;
    z-index:1000;
    transition:.4s;
}

.modal.show{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
}

.modal-close{
    position:absolute;
    top:10px;
    left:15px;
    border:none;
    background:none;
    color:white;
    font-size:24px;
    cursor:pointer;
}

.modal-game-icon{
    width:120px;
    height:120px;
    border-radius:16px;
    border:2px solid rgba(0,234,255,.5);
    box-shadow:0 0 25px rgba(0,234,255,.4);
}

.primary-download-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(135deg,#00ff99,#00c8ff);
}

.progress-container{display:none;margin-top:20px;}
.progress-bar{height:18px;background:#1b2330;border-radius:30px;overflow:hidden;}
.progress-fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#00ff99,#00eaff,#0066ff);
}
@media(max-width:600px){
.title-box{width:90%;padding:15px}
.title-box h1{font-size:1.4em}

}

.platform-icon{

.platform-select-btn{
display:flex;

justify-content:center;

.android-btn{

.ios-btn{

}

}

.title-box h1{
font-size:1.8em!important;
}

.top-logo{
font-size:11px!important;
}

document.getElementById('platformText').innerText=btn.dataset.platform;
modal.classList.add('show');
overlay.style.display='block';
};
});

overlay.onclick=()=>{
modal.classList.remove('show');
overlay.style.display='none';
};

};
